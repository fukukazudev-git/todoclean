<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo 編集</title>
</head>
<body>

<h1>Todo 編集</h1>

<form th:action="@{'/todo/' + ${todo.id}}" method="post"　th:object="${form}">
    <!-- PUT メソッドに変換-->
    <input type="hidden" name="_method" value="put">
     
    
    <!-- version を hidden で埋め込む -->
    <input type="hidden" name="version" th:value="${todo.version}">

    <label>タイトル</label>
    <input type="text" name="title" th:value="${todo.title}">
    <br>

    <label>完了：</label>
    <input type="checkbox" name="done" th:checked="${todo.done}">
    <br>

    <button type="submit">更新</button>
</form>

</body>
</html>
